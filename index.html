<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta name="theme-color" content="#0b0f1c" />
  <title>Magic Lie Weed</title>
  <link rel="icon" href="logo.png?v=38" type="image/png" />
  <link rel="apple-touch-icon" href="logo.png?v=38" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Magic Lie Weed" />
  <link rel="stylesheet" href="style.css?v=38" />
</head>
<body>
  <header>
    <div class="logo"><img src="logo.png?v=38" alt="Magic Lie Weed" /></div>
    <div class="search-bar">
      <div class="autocomplete-wrapper">
        <input type="text" id="locationInput" placeholder="Search surf spot or city…" autocomplete="off" />
        <ul id="suggestions"></ul>
      </div>
      <button id="searchBtn">Search</button>
      <button id="locateBtn" title="Use my location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="7"/>
          <line x1="12" y1="17" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="7" y2="12"/>
          <line x1="17" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div id="splash" class="splash">
      <div class="splash-wave"></div>
      <div class="splash-content">
        <img src="logo.png?v=38" alt="Magic Lie Weed" class="splash-logo" />
        <p>Search any surf spot or use your location for a 7-day forecast.</p>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Loading forecast…</p>
    </div>

    <div id="error" class="error-box hidden"></div>

    <div id="app" class="hidden">
      <div class="loc-bar">
        <h2 id="locationName"></h2>
        <span id="locationCoords"></span>
        <a id="camBtn" class="cam-btn hidden" target="_blank" rel="noopener noreferrer">📷 Cams</a>
      </div>

      <div class="nearby-spots hidden" id="nearbySpots"></div>

      <div class="now-banner" id="nowBanner"></div>

      <div id="mswForecast"></div>

      <div class="model-tabs hidden" id="modelTabs">
        <button class="model-tab active" data-model="openmeteo">Best Match</button>
        <button class="model-tab" data-model="gfs">GFS Wind</button>
        <button class="model-tab" data-model="ecmwf">ECMWF Wind</button>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-main">
      Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> Marine &amp; Weather APIs · Free &amp; open source
    </div>
    <div class="crew-row">
      <label class="crew-label" for="crewInput">👥 Crew code:</label>
      <input type="text" id="crewInput" class="crew-input" placeholder="e.g. NORTHDEVON" maxlength="12" autocomplete="off" autocapitalize="characters" />
      <button id="crewSave" class="crew-save">Save</button>
    </div>
  </footer>

  <div id="installBanner" class="install-banner hidden">
    <span id="installMsg"></span>
    <button id="installBtn" class="install-action hidden">Install</button>
    <button id="installDismiss" class="install-dismiss">✕</button>
  </div>

  <script src="app.js?v=38"></script>
</body>
</html>
