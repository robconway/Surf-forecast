name: Update buoy data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CCO buoy data and write buoy.json
        run: |
          curl -sf \
            -H "Referer: https://robconway.github.io/" \
            "https://coastalmonitoring.org/observations/waves/latest.geojson?key=01eb4cef4d2081defb985705e8450ef8" \
            -o /tmp/cco.json \
            || echo '{"features":[]}' > /tmp/cco.json

          BUOY=$(jq -c '
            [ .features[]
              | select( .properties | to_entries
                  | map(.value | tostring | ascii_downcase)
                  | any(contains("bideford")) )
              | .properties
            ] | first // null
          ' /tmp/cco.json)

          HS=$(echo  "$BUOY" | jq -r '.hs   // null')
          TP=$(echo  "$BUOY" | jq -r '.tp   // null')
          DIR=$(echo "$BUOY" | jq -r '.pdir // null')

          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"hs\": $HS, \"tp\": $TP, \"dir\": $DIR, \"updated\": \"$UPDATED\"}" > buoy.json
          echo "Bideford Bay Hs=${HS}m Tp=${TP}s Dir=${DIR}deg at ${UPDATED}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buoy.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update buoy data [skip ci]"
            git pull --rebase origin main
            git push
          fi
