name: Update buoy data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CCO buoy data and write buoy.json
        run: |
          curl -sf \
            -H "Referer: https://robconway.github.io/" \
            "https://coastalmonitoring.org/observations/waves/latest.geojson?key=15a08442e69a49641285776883544efa" \
            -o /tmp/cco.json \
            || echo '{"features":[]}' > /tmp/cco.json

          echo "=== CCO debug ==="
          echo "Feature count: $(jq '.features | length' /tmp/cco.json)"
          echo "First feature props: $(jq -c '.features[0].properties // {}' /tmp/cco.json)"
          echo "Bideford match: $(jq -c '[.features[] | select(.properties | to_entries | map(.value | tostring | ascii_downcase) | any(contains("bideford"))) | .properties] | first // "NOT FOUND"' /tmp/cco.json)"
          echo "Station-97 match: $(jq -c '[.features[] | select(.properties | to_entries | map(.value | tostring) | any(. == "97")) | .properties] | first // "NOT FOUND"' /tmp/cco.json)"
          echo "=================="

          HS=$(jq -r '
            [ .features[]
              | select( .properties | to_entries
                  | map(.value | tostring | ascii_downcase)
                  | any(contains("bideford")) )
              | .properties
              | (.Hs // .hs // .height // .sig_wave_height // .Hm0
                 // .wave_height // .significant_wave_height
                 // .significantWaveHeight // .Significant_Wave_Height)
            ] | first // null
          ' /tmp/cco.json)

          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"hs\": $HS, \"updated\": \"$UPDATED\"}" > buoy.json
          echo "Bideford Bay Hs=${HS}m at ${UPDATED}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buoy.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update buoy data [skip ci]"
            git pull --rebase origin main
            git push
          fi
