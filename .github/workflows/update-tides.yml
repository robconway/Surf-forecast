name: Update tide data

on:
  schedule:
    # Run every Monday and Thursday at 05:30 UTC.
    # Each run fetches 5 days of data starting from yesterday midnight UTC,
    # giving a 1-day look-back buffer (catches early-morning events in all
    # time zones) and a ~2-day forward overlap before the next run.
    # 2 runs/week × 10 nodes = 10 requests per run — exactly within the
    # Stormglass free-tier limit of 10 requests/day.
    - cron: '30 5 * * 1,4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tide extremes from Stormglass API
        env:
          STORMGLASS_KEY: ${{ secrets.STORMGLASS_KEY }}
        run: |
          set -euo pipefail

          # Start from midnight UTC yesterday so local-time events that fall
          # before the runner's wall-clock (e.g. a 00:11 BST low water) are
          # always captured.  Fetch 5 days: yesterday + today + 3 days ahead.
          START=$(date -u -d 'yesterday 00:00' +%s)
          END=$((START + 5 * 86400))
          echo "Window: $(date -u -d @$START +%Y-%m-%d) → $(date -u -d @$END +%Y-%m-%d)"

          # 10 UK/Ireland tidal reference nodes — exactly 10 Stormglass
          # requests per run, matching the free-tier daily limit.
          NODES=(
            "51.21,-4.11"   # Ilfracombe / N Devon
            "51.45,-3.18"   # Cardiff / Bristol Channel
            "50.83,-4.54"   # Bude
            "50.41,-5.08"   # Newquay  (covers Perranporth)
            "50.57,-4.87"   # Polzeath / Padstow
            "50.07,-5.70"   # Sennen / Land's End
            "54.58,-0.97"   # Saltburn
            "58.59,-3.52"   # Thurso
            "55.20,-6.66"   # Portrush  (covers Tiree via fallback)
            "54.48,-8.28"   # Bundoran  (covers Lahinch & Inch Beach)
          )

          NODES_JSON="[]"
          OK=0; FAIL=0

          for node in "${NODES[@]}"; do
            lat="${node%%,*}"
            lon="${node##*,}"
            echo -n "  lat=$lat lon=$lon … "

            # Do NOT use -f: we want the response body even on HTTP errors
            # (e.g. 402 quota exceeded) so the real message is logged.
            resp=$(curl -s --max-time 20 \
              -H "Authorization: ${STORMGLASS_KEY}" \
              "https://api.stormglass.io/v2/tide/extremes/point?lat=${lat}&lng=${lon}&start=${START}&end=${END}" \
              || echo '{}')

            count=$(echo "$resp" | jq -r '(.data // []) | length')

            if [ "${count:-0}" -gt 0 ]; then
              extremes=$(echo "$resp" | jq -c \
                '[.data[] | {
                   time: .time,
                   type: (if .type == "high" then "High" else "Low" end),
                   height: (.height * 100 | round / 100)
                 }]')
              node_obj=$(jq -n \
                --argjson lat  "$lat" \
                --argjson lon  "$lon" \
                --argjson extr "$extremes" \
                '{lat: $lat, lon: $lon, extremes: $extr}')
              NODES_JSON=$(echo "$NODES_JSON" | jq -c --argjson n "$node_obj" '. + [$n]')
              echo "✓ $count events"
              OK=$((OK + 1))
            else
              echo "✗ $(echo "$resp" | jq -c '.errors // .message // .error // "unknown — check key/quota"')"
              FAIL=$((FAIL + 1))
            fi
          done

          if [ "$OK" -eq 0 ]; then
            echo "All requests failed — not overwriting tides.json"
            exit 1
          fi

          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg     updated "$UPDATED" \
            --argjson nodes   "$NODES_JSON" \
            '{updated: $updated, nodes: $nodes}' > tides.json

          echo "Done — $OK nodes OK, $FAIL failed. Updated: $UPDATED"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tides.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update tide predictions [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
